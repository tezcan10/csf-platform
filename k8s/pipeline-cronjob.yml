apiVersion: batch/v1
kind: CronJob
metadata:
  name: csf-pipeline
  namespace: csf-platform
spec:
  schedule: "*/2 * * * *"          # poll every 2 minutes
  concurrencyPolicy: Forbid         # skip if previous run still going
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: pipeline-runner
          restartPolicy: Never
          volumes:
            - name: pipeline-data
              persistentVolumeClaim:
                claimName: pipeline-data
          containers:
            - name: pipeline
              image: acrcsfdemo.azurecr.io/csf-pipeline:latest
              imagePullPolicy: Always
              env:
                - name: ANTHROPIC_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: pipeline-secrets
                      key: ANTHROPIC_API_KEY
                - name: GITHUB_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: pipeline-secrets
                      key: GITHUB_TOKEN
                - name: LOG_DIR
                  value: /data/logs
                - name: STATE_FILE
                  value: /data/.agent1_state
              volumeMounts:
                - name: pipeline-data
                  mountPath: /data
